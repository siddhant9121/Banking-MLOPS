
classifier:
  model_type: "resnet50"
  batch_size: 32
  learning_rate: 0.001
  epochs: 50
  num_classes: 12

ner:
  model_type: "bert"
  model_name: "bert-base-uncased"
  batch_size: 16
  learning_rate: 0.00005
  max_length: 512
  epochs: 30

data:
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  input_formats:
    - "jpg"
    - "png"
    - "pdf"

training:
  use_gpu: true
  random_seed: 42
  log_interval: 100