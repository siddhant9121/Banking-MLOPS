name: Banking MLOps Continuous Integration Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Formatter Check (Black)
        run: |
          black --check src/ || echo "Formatting issues found!"

      - name: Import Sort Check (isort)
        run: |
          isort --check-only src/ || echo "Import order issues found!"

      - name: Lint with Flake8
        run: |
          flake8 src/ --max-line-length=100 || true

  unit-tests:
    name: Unit & Integration Tests
    needs: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
          cache: 'pip'

      - name: Install Application Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PyTest Suite
        run: |
          mkdir -p test-reports
          pytest tests/ -v --junitxml=test-reports/results.xml || true
          
      - name: Upload Test Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: pytest-results
          path: test-reports/results.xml
          retention-days: 5

  ml-pipeline-verification:
    name: ML Model Dry-Run & Validation
    needs: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Configurations
        run: |
          echo "Checking for configuration files..."
          ls -la configs/ || true
          cat params.yaml || true

      - name: Verify DVC Pipeline
        run: |
          dvc status || echo "DVC not initialized or nothing to check"
          dvc repro --dry-run || echo "Dry run completed or dvc repro not possible"

      - name: Dry-run Model Training
        run: |
          echo "Simulating model training run..."
          if [ -f "src/train.py" ]; then
            python src/train.py --config configs/model_config.yaml || echo "Training script failed/warnings"
          else
            echo "Training script not found, skipping."
          fi

  build-and-package:
    name: Build & Test Docker Image
    needs: [unit-tests, ml-pipeline-verification]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Image
        run: |
          docker build -t banking-api:latest -t banking-api:${{ github.sha }} .

      - name: Image Size Verification
        run: |
          docker images | grep banking-api

      - name: Container Smoke Test
        run: |
          docker run -d --name api-test banking-api:latest
          sleep 5
          docker logs api-test
          docker rm -f api-test
